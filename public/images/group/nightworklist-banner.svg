<svg xmlns="http://www.w3.org/2000/svg" width="970" height="250" viewBox="0 0 970 250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111827;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f2937;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0" />
      <stop offset="20%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="970" height="250" fill="url(#bg)"/>

  <!-- 上下のアクセントライン -->
  <rect x="0" y="0" width="970" height="3" fill="url(#line)" opacity="0.6"/>
  <rect x="0" y="247" width="970" height="3" fill="url(#line)" opacity="0.6"/>

  <!-- サイト名 -->
  <text x="485" y="118" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic Pro', sans-serif" font-size="64" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="2">ナイトワーク<tspan fill="#fbbf24">リスト</tspan></text>

  <!-- キャッチコピー -->
  <text x="485" y="163" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic Pro', sans-serif" font-size="22" fill="#fbbf24" text-anchor="middle" letter-spacing="1">基本無料で掲載！ナイトビジネス支援サービス</text>

  <!-- サブテキスト -->
  <text x="485" y="205" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic Pro', sans-serif" font-size="16" fill="#6b7280" text-anchor="middle">キャバクラ・ホスト・ガールズバーの求人・店舗掲載サービス</text>
</svg>
